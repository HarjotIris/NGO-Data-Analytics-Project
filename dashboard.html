<!DOCTYPE html>
<html lang = 'en'>
    <head>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
                margin: 0;
                padding: 20px;
                color: #333
            }

            h1{
                text-align: center;
                color: #2c3e50;
                margin-bottom: 30px;
            }

            .chart-container{
                background: white;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 30px;
                width: 60%;
                margin-left: auto;
                margin-right: auto;
            }
        </style>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>NGO Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <h1>NGO Analytics Dashboard</h1>
        <div class = "chart-container">
            <canvas id = "cityChart"></canvas>
        </div>
        <script>
            async function loadCityChart(){
                const response = await fetch("http://localhost:8000/cities");
                const data = await response.json();

                const labels = data.map(d => d.city);
                const values = data.map(d => d.total_beneficiaries);

                const ctx = document.getElementById("cityChart").getContext("2d");
                new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Total Beneficiaries by City",
                            data: values,
                            backgroundColor: "#3498db"
                        }]
                    }
                });
            }
            loadCityChart();
        </script>
    </body>
</html>
